<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音樂播放器</title>
    <style>
        /* 基礎設定 */
        body {
            background-color: #121212;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #ffffff;
            padding: 40px 20px;
            margin: 0;
            -webkit-font-smoothing: antialiased; /* 讓字體更平滑清晰 */
        }
        
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* 標題設計 (簡約風) */
        h1 { 
            text-align: center; 
            font-size: 2.8rem; 
            margin-bottom: 50px; 
            font-weight: 800;
            letter-spacing: 2px;
        }
        h2 { 
            margin-bottom: 25px; 
            color: #ffffff; 
            font-weight: 600; 
            font-size: 1.5rem;
            border-left: 4px solid #ffffff; /* 加一個俐落的小邊條 */
            padding-left: 12px;
        }

        /* 網格排版 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 24px;
            margin-bottom: 60px;
        }
        
        /* ✨ 升級版卡片設計 (無邊框、柔和陰影) */
        .card {
            background-color: #1a1a1a; /* 比背景稍微亮一點點的深灰 */
            border-radius: 16px; /* 更圓潤現代的導角 */
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .card:hover {
            transform: translateY(-6px); /* 懸浮效果 */
            box-shadow: 0 12px 24px rgba(255,255,255,0.05); /* 微微的白光暈 */
            background-color: #222222;
        }
        
        /* 🎵 這裡就是你說的字體顏色！統一改成乾淨的 #e0e0e0 */
        .card h3 { 
            margin-top: 0; 
            margin-bottom: 25px;
            color: #e0e0e0; 
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            line-height: 1.4;
        }
        
        /* 🖱️ 升級版按鈕設計 (純白簡約風) */
        .link-btn {
            display: inline-block;
            background-color: #ffffff; /* 統一改成純白 */
            color: #121212; /* 深色文字對比更強烈 */
            text-decoration: none;
            padding: 14px 0;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.2s ease;
            width: 100%; /* 讓按鈕填滿卡片寬度，視覺更整齊 */
            box-sizing: border-box;
        }
        .link-btn:hover { 
            background-color: #e0e0e0; /* 滑鼠移過去稍微變暗 */
            transform: scale(1.03); /* 按鈕微微放大 */
        }

        /* 極簡分隔線 */
        hr {
            border: 0;
            height: 1px;
            background: rgba(255,255,255,0.1); /* 半透明的很淡的線 */
            margin: 60px 0;
        }
    </style>
</head>
